<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RetailHub - Authentication</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .auth-container {
            width: 100%;
            max-width: 450px;
        }

        .auth-card {
            border-radius: 1.5rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            border: none;
        }

        .auth-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 2rem;
            text-align: center;
            border-radius: 1.5rem 1.5rem 0 0;
        }

        .auth-header h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        .form-input {
            border-radius: 0.75rem;
            border: 2px solid #e0e0e0;
            padding: 0.75rem 1rem;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.15);
        }

        .btn-auth {
            border-radius: 0.75rem;
            padding: 0.75rem;
            font-weight: 600;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            transition: all 0.3s ease;
        }

        .btn-auth:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(102, 126, 234, 0.3);
            color: white;
        }

        .btn-auth:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .toggle-form {
            text-align: center;
            margin-top: 1.5rem;
            color: #666;
        }

        .toggle-form a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }

        .toggle-form a:hover {
            text-decoration: underline;
        }

        .role-selector {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .role-option {
            flex: 1;
        }

        .role-option input[type="radio"] {
            display: none;
        }

        .role-option label {
            display: block;
            padding: 0.75rem;
            border: 2px solid #e0e0e0;
            border-radius: 0.75rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 0;
        }

        .role-option input[type="radio"]:checked + label {
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.1);
        }

        .hidden-form {
            display: none !important;
        }

        .visible-form {
            display: block !important;
        }

        .alert {
            border-radius: 0.75rem;
        }

        .spinner-border-sm {
            width: 0.875rem;
            height: 0.875rem;
            border-width: 0.2em;
        }
    </style>
</head>
<body>

<div class="auth-container">
    <div class="card auth-card">
        <div class="auth-header">
            <h1><i class="bi bi-shop"></i></h1>
            <h2>RetailHub</h2>
            <p class="mb-0">Store Management System</p>
        </div>

        <div class="card-body p-4">
            <!-- LOGIN FORM -->
            <form id="loginForm" class="visible-form">
                <h5 class="mb-4 fw-bold">Sign In</h5>
                
                <div id="loginAlert"></div>
                
                <div class="mb-3">
                    <label class="form-label fw-semibold">Email Address</label>
                    <input type="email" class="form-control form-input" id="loginEmail" required autofocus>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Password</label>
                    <input type="password" class="form-control form-input" id="loginPassword" required>
                </div>

                <button type="submit" class="btn btn-auth w-100 mb-3" id="loginBtn">
                    <i class="bi bi-box-arrow-in-right me-2"></i> Sign In
                </button>

                <div class="toggle-form">
                    Don't have an account? <a onclick="toggleForms(); return false;">Sign Up</a>
                </div>
            </form>

            <!-- SIGNUP FORM -->
            <form id="signupForm" class="hidden-form">
                <h5 class="mb-4 fw-bold">Create Account</h5>
                
                <div id="signupAlert"></div>
                
                <div class="mb-3">
                    <label class="form-label fw-semibold">Full Name</label>
                    <input type="text" class="form-control form-input" id="signupName" required>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Email Address</label>
                    <input type="email" class="form-control form-input" id="signupEmail" required>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Password</label>
                    <input type="password" class="form-control form-input" id="signupPassword" required 
                           minlength="6" placeholder="At least 6 characters">
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold d-block mb-2">Select Role</label>
                    <div class="role-selector">
                        <div class="role-option">
                            <input type="radio" id="roleAdmin" name="role" value="admin">
                            <label for="roleAdmin">
                                <i class="bi bi-shield-check"></i><br>
                                <small>Admin</small>
                            </label>
                        </div>
                        <div class="role-option">
                            <input type="radio" id="roleStaff" name="role" value="staff" checked>
                            <label for="roleStaff">
                                <i class="bi bi-person-badge"></i><br>
                                <small>Staff</small>
                            </label>
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn btn-auth w-100 mb-3" id="signupBtn">
                    <i class="bi bi-person-plus me-2"></i> Create Account
                </button>

                <div class="toggle-form">
                    Already have an account? <a onclick="toggleForms(); return false;">Sign In</a>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const API_URL = 'http://localhost:5000/api/auth';

    function toggleForms() {
        document.getElementById('loginForm').classList.toggle('visible-form');
        document.getElementById('loginForm').classList.toggle('hidden-form');
        document.getElementById('signupForm').classList.toggle('visible-form');
        document.getElementById('signupForm').classList.toggle('hidden-form');
        
        // Clear alerts
        document.getElementById('loginAlert').innerHTML = '';
        document.getElementById('signupAlert').innerHTML = '';
    }

    function showAlert(elementId, message, type = 'danger') {
        const alertEl = document.getElementById(elementId);
        alertEl.innerHTML = `<div class="alert alert-${type} alert-dismissible fade show" role="alert">
            <i class="bi bi-${type === 'success' ? 'check-circle' : 'exclamation-triangle'} me-2"></i>
            ${message}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>`;
    }

    // LOGIN
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;
        const btn = document.getElementById('loginBtn');
        
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> Signing in...';

        try {
            const response = await fetch(`${API_URL}/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            const result = await response.json();

            if (result.status === 'success') {
                // Store auth data
                localStorage.setItem('auth_token', result.session.access_token);
                localStorage.setItem('refresh_token', result.session.refresh_token || '');
                localStorage.setItem('user', JSON.stringify(result.session.user));
                
                console.log('Login successful, redirecting to dashboard...');
                window.location.href = '/';
            } else {
                showAlert('loginAlert', result.message || 'Login failed', 'danger');
                btn.disabled = false;
                btn.innerHTML = '<i class="bi bi-box-arrow-in-right me-2"></i> Sign In';
            }
        } catch (error) {
            console.error('Login error:', error);
            showAlert('loginAlert', 'Error: ' + error.message, 'danger');
            btn.disabled = false;
            btn.innerHTML = '<i class="bi bi-box-arrow-in-right me-2"></i> Sign In';
        }
    });

    // SIGNUP
    document.getElementById('signupForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const full_name = document.getElementById('signupName').value.trim();
        const email = document.getElementById('signupEmail').value.trim();
        const password = document.getElementById('signupPassword').value;
        const role = document.querySelector('input[name="role"]:checked').value;
        const btn = document.getElementById('signupBtn');
        
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> Creating...';

        try {
            const response = await fetch(`${API_URL}/signup`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ full_name, email, password, role })
            });
            const result = await response.json();

            if (result.status === 'success') {
                showAlert('signupAlert', 'Account created! Switching to login...', 'success');
                
                setTimeout(() => {
                    document.getElementById('loginEmail').value = email;
                    document.getElementById('loginPassword').value = '';
                    document.getElementById('signupName').value = '';
                    document.getElementById('signupEmail').value = '';
                    document.getElementById('signupPassword').value = '';
                    toggleForms();
                }, 1500);
            } else {
                showAlert('signupAlert', result.message || 'Signup failed', 'danger');
                btn.disabled = false;
                btn.innerHTML = '<i class="bi bi-person-plus me-2"></i> Create Account';
            }
        } catch (error) {
            console.error('Signup error:', error);
            showAlert('signupAlert', 'Error: ' + error.message, 'danger');
            btn.disabled = false;
            btn.innerHTML = '<i class="bi bi-person-plus me-2"></i> Create Account';
        }
    });

    // Prevent caching for auth pages
    window.addEventListener('pageshow', (event) => {
        if (event.persisted) {
            console.log('Page restored from cache, checking auth...');
            const token = localStorage.getItem('auth_token');
            if (token) {
                window.location.href = '/';
            }
        }
    });
    document.getElementById('signupForm').style.display = 'none';
    document.querySelector('.toggle-form').innerHTML = '<p class="text-muted">Contact your administrator to create an account</p>';
</script>
</body>
</html>
